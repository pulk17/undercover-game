services:
- type: web
  name: undercover-game-server
  runtime: node
  rootDir: server
  buildCommand: npm install --include=dev && npm run build
  startCommand: node dist/server/src/index.js
  healthCheckPath: /api/v1/health
  envVars:
  - key: NODE_ENV
    value: production
  - key: PORT
    value: 3001
  - key: CLIENT_ORIGIN
    sync: false
  - key: JWT_SECRET
    sync: false
  - key: FIREBASE_PROJECT_ID
    sync: false
  - key: FIREBASE_CLIENT_EMAIL
    sync: false
  - key: FIREBASE_PRIVATE_KEY
    sync: false
  - key: UPSTASH_REDIS_REST_URL
    sync: false
  - key: UPSTASH_REDIS_REST_TOKEN
    sync: false
  - key: SUPABASE_URL
    sync: false
  - key: SUPABASE_SERVICE_ROLE_KEY
    sync: false
  - key: SENTRY_DSN
    sync: false
